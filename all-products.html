<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Products</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.search{
padding:20px;
text-align:center;
}

.search input{
width:80%;
max-width:500px;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
}

.btn{
display:inline-block;
background:#ff6b00;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:6px;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>All Products</h1>
</header>

<div class="search">
<input type="text" placeholder="Search Products">
</div>

<div class="products">

<div class="card">
<h3>Wireless Earbuds</h3>
<p>₹999</p>
<a href="product.html" class="btn">View Product</a>
  <img src="https://via.placeholder.com/200" width="100%">
</div>

<div class="card">
<h3>Smart Watch</h3>
<p>₹1499</p>
<a href="product.html" class="btn">View Product</a>
  <img src="https://via.placeholder.com/200" width="100%">
</div>

<div class="card">
<h3>Bluetooth Speaker</h3>
<p>₹799</p>
<a href="product.html" class="btn">View Product</a>
  <img src="https://via.placeholder.com/200" width="100%">
</div>

</div>

</body>
</html>
