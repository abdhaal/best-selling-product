<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Georgia, serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:25px;
font-size:22px;
font-weight:bold;
font-style:italic;
}

.login-box{
max-width:420px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.login-box h2{
text-align:center;
color:#001f3f;
font-size:24px;
margin-bottom:25px;
font-style:italic;
}

input{
width:100%;
padding:16px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
font-style:italic;
}

.login-btn{
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:#001f3f;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.login-btn:hover{
background:#001f3f;
}

.signup-btn{
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:#0d6efd;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:12px;
}

.signup-btn:hover{
background:#0b5ed7;
}

.info{
margin-top:20px;
font-size:15px;
color:#001f3f;
line-height:1.6;
}

.info a{
color:#001f3f;
font-weight:bold;
text-decoration:none;
}

.new-user{
margin-top:25px;
}

.new-user h3{
color:#000;
font-size:18px;
margin-bottom:10px;
}

.new-user a{
color:#001f3f;
font-weight:bold;
font-size:18px;
text-decoration:none;
}

#msg{
margin-top:15px;
text-align:center;
font-size:14px;
font-weight:bold;
}

.footer{
background:#001f3f;
color:white;
text-align:center;
padding:25px;
margin-top:50px;
font-style:italic;
}

.footer a{
color:white;
text-decoration:none;
margin:0 10px;
}
</style>
</head>
<body>

<div class="header">
Best Selling Product
</div>

<div class="login-box">

<h2>Customer Login</h2>

<input type="email" id="email" placeholder="Customer Email">
<input type="password" id="password" placeholder="Password">

<button class="login-btn" onclick="login()">
Continue
</button>


<div class="info">
By continuing, you agree to our
<a href="#">Terms & Conditions</a>
and
<a href="#">Privacy Policy</a>.
</div>

<div class="new-user">
<h3>New Customer?</h3>
<a href="customer-signup.html">Create Customer Account</a>
</div>

<p id="msg"></p>

</div>

<div class="footer">
<a href="#">Terms</a> |
<a href="#">Privacy Policy</a> |
<a href="#">Contact</a>
<br><br>
© 2026 Best Selling Product
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGNUP
function signup(){

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email,password)
.then(()=>{

document.getElementById("msg").style.color="green";
document.getElementById("msg").innerText="Account Created Successfully";

})
.catch((err)=>{

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerText=err.message;

});

}

// LOGIN
function login(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

auth.signInWithEmailAndPassword(email,password)

.then((userCredential)=>{

localStorage.setItem(
"user",
userCredential.user.email
);

window.location.href =
"customer-home.html";

})

.catch((err)=>{

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerText=
err.message;

});

  }

</script>

</body>
</html>
