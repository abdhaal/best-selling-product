<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#0a66ff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#ff6b00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#0a66ff;
}
</style>

</head>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy2jyuQ_DQuMctYvnDQQG6OH_-wtMnLqI",
  authDomain: "best-selling-product-6dbdd.firebaseapp.com",
  projectId: "best-selling-product-6dbdd",
  storageBucket: "best-selling-product-6dbdd.firebasestorage.app",
  messagingSenderId: "208441607475",
  appId: "1:208441607475:web:d04616c3644308ca3baa46",
  measurementId: "G-1EK3ZGKY5F"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginUser = function() {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)

.then((userCredential) => {

alert("Login Successful!");

window.location.href = "customer-dashboard.html";

})

.catch((error) => {

alert(error.message);

});

}

</script>
<body>

<div class="login-box">

<h2>Customer Login</h2>

<form action="customer-dashboard.html">
<input type="email" id="email" placeholder="Customer Email" required>

<input type="password" id="password" placeholder="Password" required>

<button type="button" onclick="loginUser()">Login</button>
</form>

<a href="#">Create Account</a>

</div>

</body>
</html>
