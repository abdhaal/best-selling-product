<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.login-container{
max-width:400px;
margin:30px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.login-container h2{
margin-bottom:20px;
color:#001f3f;
}

.login-container label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

.login-container input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:20px;
font-size:16px;
}

.login-btn{
width:100%;
padding:14px;
background:#001f3f;
color:white;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
background:#003366;
}
.continue-btn{
display:block;
width:100%;
background:#001f3f;
color:white;
text-decoration:none;
text-align:center;
padding:14px;
border-radius:8px;
font-size:18px;
font-weight:bold;
margin-top:15px;
}

.continue-btn:hover{
background:#003366;
  }
.info{
margin-top:20px;
font-size:14px;
line-height:1.6;
}

.info a{
color:#001f3f;
text-decoration:none;
font-weight:bold;
}

.footer{
margin-top:40px;
background:#001f3f;
color:white;
text-align:center;
padding:20px;
}

.footer a{
color:white;
text-decoration:none;
margin:0 8px;
}
</style>
</head>

<body>

<div class="header">
Best Selling Product
</div>

<div class="login-container">

<h2>Sign in or Create Account</h2>

<label>Enter Mobile Number or Email</label>

<input type="text" placeholder="Mobile Number or Email">

<a href="otp.html" class="continue-btn">
Continue
</a>

<div class="info">
By continuing, you agree to our
<a href="terms-andconditions.html">Terms & Conditions</a>
and
<a href="privacy-policy.html">Privacy Policy</a>.
</div>

<br>

<h3>Sell your product?</h3>

<a href="seller-login.html">
Create a Free Seller Account
</a>

</div>

<div class="footer">

<p>
<a href="terms-andconditions.html">Terms</a> |
<a href="privacy-policy.html">Privacy Policy</a> |
<a href="contact.html">Contact</a>
</p>

<p>© 2026 Best Selling Product</p>

</div>

</body>
</html>
