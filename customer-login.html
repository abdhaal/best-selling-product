<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.login-container{
max-width:400px;
margin:30px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
margin-bottom:20px;
color:#001f3f;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#001f3f;
color:white;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
background:#003366;
}

#msg{
color:red;
font-size:14px;
margin-top:10px;
}

.footer{
margin-top:40px;
background:#001f3f;
color:white;
text-align:center;
padding:20px;
}

.footer a{
color:white;
text-decoration:none;
margin:0 8px;
}
</style>

</head>

<body>

<div class="header">
Best Selling Product
</div>

<div class="login-container">

<h2>Login / Create Account</h2>

<label>Email / Mobile Number</label>
<input type="email" id="email" placeholder="Enter Email">

<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

</div>

<div class="footer">
<p>
<a href="#">Terms</a> |
<a href="#">Privacy Policy</a> |
<a href="#">Contact</a>
</p>
<p>© 2026 Best Selling Product</p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
// 🔥 Your Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCy2jyuQ_DQuMctYvnDQQG6OH_-wtMnLqI",
  authDomain: "best-selling-product-6dbdd.firebaseapp.com",
  projectId: "best-selling-product-6dbdd",
  storageBucket: "best-selling-product-6dbdd.firebasestorage.app",
  messagingSenderId: "208441607475",
  appId: "1:208441607475:web:d04616c3644308ca3baa46",
  measurementId: "G-1EK3ZGKY5F"
};

// init firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGN UP
function signup(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.createUserWithEmailAndPassword(email, password)
.then(user=>{
document.getElementById("msg").style.color="green";
document.getElementById("msg").innerText="Account Created Successfully!";
})
.catch(err=>{
document.getElementById("msg").style.color="red";
document.getElementById("msg").innerText=err.message;
});
}

// LOGIN
function login(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

auth.signInWithEmailAndPassword(email, password)
.then(user=>{
window.location.href="index.html";
})
.catch(err=>{
document.getElementById("msg").innerText=err.message;
});
}
</script>

</body>
</html>
