<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details</title><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.product-image{
width:100%;
max-width:400px;
display:block;
margin:auto;
border-radius:10px;
}

.product-name{
font-size:28px;
font-weight:bold;
margin-top:20px;
color:#001f3f;
}

.price{
font-size:26px;
font-weight:bold;
color:#001f3f;
margin:15px 0;
}

.description{
line-height:1.7;
margin-top:15px;
}

.qty{
width:80px;
padding:10px;
margin-top:15px;
}

.btn{
display:inline-block;
padding:12px 20px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
margin-right:10px;
}

.cart-btn{
background:#ff9800;
}

.buy-btn{
background:#001f3f;
}
</style></head><body><div class="header">
Product Details
</div><div class="container"><img id="productImage" class="product-image"><h2 id="productName" class="product-name"></h2><div id="productPrice" class="price"></div><p id="productDescription" class="description"></p><label>Quantity</label><br>
<input type="number" id="qty" class="qty" value="1" min="1">

<br><button class="btn cart-btn" onclick="addToCart()">
Add To Cart
</button><button class="btn buy-btn" onclick="buyNow()">
Buy Now
</button></div><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const productId =
new URLSearchParams(window.location.search).get("id");

// Product Load
db.collection("products")
.doc(productId)
.get()
.then((doc)=>{

if(doc.exists){

const product = doc.data();

document.getElementById("productImage").src =
product.image || "";

document.getElementById("productName").innerHTML =
product.name || "";

document.getElementById("productPrice").innerHTML =
"₹" + product.price;

document.getElementById("productDescription").innerHTML =
product.description || "No description available";

}

});

// Add To Cart
function buyNow(){

let user = localStorage.getItem("user");

if(!user){

alert("Please Login First");

window.location.href =
"customer-login.html";

return;

}

let qty =
document.getElementById("qty").value;

// Login irundha checkout page open aagum
window.location.href =
"buy-now.html?id=" +
productId +
"&qty=" +
qty;

}

</script></body>
</html>
