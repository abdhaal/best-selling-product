<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Reports</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:15px;
}
</style>
</head>

<body>

<header>
<h1>Sales Reports</h1>
</header>

<div class="container">

<div class="card">
<h2>Today's Sales</h2>
<p>₹2,500</p>
</div>

<div class="card">
<h2>This Month Sales</h2>
<p>₹35,000</p>
</div>

<div class="card">
<h2>Total Products Sold</h2>
<p>120 Products</p>
</div>

<div class="card">
<h2>Total Customers</h2>
<p>75 Customers</p>
</div>

</div>

</body>
</html>
