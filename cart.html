<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#001f3f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}

.btn{
width:100%;
padding:15px;
background:#001f3f;
color:white;
border:none;
border-radius:30px;
font-size:18px;
}
</style>
</head>
<body>

<div class="header">
My Cart
</div>

<div id="cartItems"></div>

<button class="btn" onclick="checkout()">
Proceed To Checkout
</button>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let html = "";

cart.forEach((item,index)=>{

html += `
<div class="card">
Product ID : ${item.productId}<br>
Quantity : ${item.qty}
</div>
`;

});

document.getElementById("cartItems").innerHTML = html;

function checkout(){

window.location.href="buy-now.html";

}
</script>

</body>
</html>
