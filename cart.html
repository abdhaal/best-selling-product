<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#001f3f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}
.cart-card{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
display:flex;
gap:15px;
position:relative;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.cart-img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
}

.remove-btn{
position:absolute;
right:15px;
top:15px;
font-size:24px;
color:red;
cursor:pointer;
font-weight:bold;
}

.checkout-btn{
width:95%;
display:block;
margin:20px auto;
padding:18px;
background:#001f3f;
color:white;
border:none;
border-radius:50px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}
.qty-box{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty-btn{
width:35px;
height:35px;
border:none;
background:#001f3f;
color:white;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

.summary-box{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.summary-row{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:18px;
}

.grand-total{
font-size:24px;
font-weight:bold;
color:#001f3f;
border-top:1px solid #ddd;
padding-top:10px;
}
.total-box{
background:white;
margin:15px;
padding:15px;
border-radius:12px;
font-size:22px;
font-weight:bold;
text-align:center;
}
.btn{
width:100%;
padding:15px;
background:#001f3f;
color:white;
border:none;
border-radius:30px;
font-size:18px;
}
</style>
</head>
<body>

<div class="header">
My Cart
</div>

<div id="cartItems"></div>

<div id="totalPrice" class="total-box"></div>

<button class="checkout-btn"
onclick="checkout()">
Proceed To Checkout
</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let html = "";
let total = 0;

async function loadCart(){

html = "";
total = 0;

for(const [index,item] of cart.entries()){

let doc = await db.collection("products")
.doc(item.productId)
.get();

if(doc.exists){

let product = doc.data();

total += Number(product.price) * Number(item.qty);

html += `
<div class="cart-card">

<span class="remove-btn"
onclick="removeItem(${index})">
❌
</span>

<img src="${product.image}"
class="cart-img">

<div style="flex:1">

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<div class="qty-box">

<button class="qty-btn"
onclick="changeQty(${index},-1)">
-
</button>

<span>${item.qty}</span>

<button class="qty-btn"
onclick="changeQty(${index},1)">
+
</button>

</div>

</div>

</div>
`;

}

}

document.getElementById("cartItems").innerHTML = html;

let delivery = 50;
let grandTotal = total + delivery;

document.getElementById("totalPrice").innerHTML = `
<div class="summary-box">

<div class="summary-row">
<span>Subtotal</span>
<span>₹${total}</span>
</div>

<div class="summary-row">
<span>Delivery</span>
<span>₹${delivery}</span>
</div>

<div class="summary-row grand-total">
<span>Total</span>
<span>₹${grandTotal}</span>
</div>

</div>
`;

}

loadCart();

function changeQty(index,value){

cart[index].qty += value;

if(cart[index].qty < 1){
cart[index].qty = 1;
}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

location.reload();

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

location.reload();

}

function checkout(){

window.location.href="buy-now.html";

}

</script>
</body>
</html>
