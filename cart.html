<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#001f3f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}
.cart-card{
display:flex;
gap:15px;
background:white;
padding:15px;
margin:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.cart-img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.cart-card h3{
margin:0;
font-size:18px;
}

.cart-card button{
background:red;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
margin-top:10px;
}
.btn{
width:100%;
padding:15px;
background:#001f3f;
color:white;
border:none;
border-radius:30px;
font-size:18px;
}
</style>
</head>
<body>

<div class="header">
My Cart
</div>

<div id="cartItems"></div>

<h2 id="totalPrice"></h2>

<button onclick="checkout()">
Proceed To Checkout
</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html = "";
let total = 0;

async function loadCart(){

for(const item of cart){

let doc = await db.collection("products")
.doc(item.productId)
.get();

if(doc.exists){

let product = doc.data();

total += Number(product.price) * Number(item.qty);

html += `
<div class="card">
<img src="${product.image}"
style="width:100px;height:100px;object-fit:cover;border-radius:10px;">

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<p>Quantity : ${item.qty}</p>
</div>
`;

}

}

document.getElementById("cartItems").innerHTML = html;
document.getElementById("totalPrice").innerHTML =
"Total : ₹" + total;

}

loadCart();

function checkout(){
window.location.href="buy-now.html";
}

</script>
</body>
</html>
