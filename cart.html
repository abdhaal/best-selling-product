<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#0a66ff;
}

.cart-item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.cart-item img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
}

.summary{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-top:20px;
}

.checkout-btn{
width:100%;
padding:12px;
background:#ff6b00;
color:white;
border:none;
border-radius:6px;
font-size:18px;
}

</style>
</head>

<body>

<h1>🛒 My Cart</h1>

<div id="cartContainer"></div>

<div class="summary">

<p>
Subtotal:
₹<span id="subtotal">0</span>
</p>

<p style="color:red;">
Delivery Discount: -₹40
</p>

<hr>

<h2>
Total:
₹<span id="total">0</span>
</h2>

<button class="checkout-btn">
Proceed To Checkout
</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

firebase.auth().onAuthStateChanged((user)=>{

if(!user){

alert("Please Login First");

window.location.href="customer-login.html";

return;

}

let subtotal = 0;

db.collection("cart")
.where("userId","==",user.uid)
.get()

.then((snapshot)=>{

const cartContainer =
document.getElementById("cartContainer");

snapshot.forEach((doc)=>{

const product = doc.data();

subtotal += Number(product.price);

cartContainer.innerHTML += `

<div class="cart-item">

<img src="${product.image}">

<h3>${product.name}</h3>

<p>₹${product.price}</p>

<button
onclick="removeCartItem('${doc.id}')"
style="
background:red;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:10px;">
❌ Remove
</button>

</div>

`;

});

if(subtotal <= 0){

document.getElementById("subtotal").innerText = 0;

document.getElementById("total").innerText = 0;

}else{

document.getElementById("subtotal").innerText = subtotal;

document.getElementById("total").innerText = subtotal - 40;

}
function removeCartItem(cartId){

db.collection("cart")
.doc(cartId)
.delete()

.then(()=>{

alert("Product Removed Successfully");

location.reload();

})

.catch((error)=>{

alert(error.message);

});

  }
});

});

</script>

</body>
</html>
