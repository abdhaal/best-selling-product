<!DOCTYPE html>
<html>
<head>
  <title>Add Product</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    .form-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      background: #0a2a43;
      color: white;
      border: none;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="form-box">
  <h2>Add Product</h2>

  <input type="text" id="name" placeholder="Product Name">
  <input type="number" id="price" placeholder="Price">

  <!-- 🔐 Affiliate link (Admin only) -->
  <div id="affiliateBox" style="display:none;">
    <input type="text" id="affiliate" placeholder="Affiliate Link">
  </div>

  <button onclick="addProduct()">Add Product</button>
</div>

<script>
  // ✅ Show affiliate field only for admin
  let role = localStorage.getItem("role");

  if (role === "admin") {
    document.getElementById("affiliateBox").style.display = "block";
  }

  function addProduct() {
    let name = document.getElementById("name").value;
    let price = document.getElementById("price").value;
    let affiliate = document.getElementById("affiliate").value;

    let products = JSON.parse(localStorage.getItem("products")) || [];

    let productData = {
      name,
      price
    };

    // ✅ Only admin can save affiliate link
    if (role === "admin") {
      productData.affiliate = affiliate;
    }

    products.push(productData);

    localStorage.setItem("products", JSON.stringify(products));

    alert("Product Added Successfully");
  }
</script>

</body>
</html>
