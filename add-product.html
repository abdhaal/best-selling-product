<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
/* same CSS */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
color:#001f3f;
margin-bottom:20px;
text-align:center;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
color:#001f3f;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
}

textarea{
height:100px;
resize:none;
}

.submit-btn{
width:100%;
background:#001f3f;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#003366;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="header">
Add Product
</div>

<div class="container">

<h2>Product Details</h2>

<label>Product Name</label>
<input type="text" placeholder="Enter Product Name">

<label>Category</label>
<select>
<option>Electronics</option>
<option>Mobiles</option>
<option>Fashion</option>
<option>Home & Kitchen</option>
<option>Beauty</option>
<option>Gaming</option>
</select>

<label>Price</label>
<input type="number" placeholder="Enter Price">

<label>Product Image</label>
<input type="file">

<label>Description</label>
<textarea placeholder="Enter Product Description"></textarea>



<button class="submit-btn">
Add Product
</button>

</div>



<script>
// Example role (normally comes from backend login)
const userRole = "admin"; // change to "user" to hide

if(userRole === "admin"){
    document.getElementById("affiliateBox").classList.remove("hidden");
}
</script>

</body>
</html>
