<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
/* same CSS */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
color:#001f3f;
margin-bottom:20px;
text-align:center;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
color:#001f3f;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
}

textarea{
height:100px;
resize:none;
}

.submit-btn{
width:100%;
background:#001f3f;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#003366;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="header">
Add Product
</div>

<div class="container">

<h2>Product Details</h2>

<label>Product Name</label>
<input type="text" id="productname" placeholder="Enter Product Name">

<label>Category</label>
<select>
<option>Electronics</option>
<option>Mobiles</option>
<option>Fashion</option>
<option>Home & Kitchen</option>
<option>Beauty</option>
<option>Gaming</option>
</select>

<label>Price</label>
<input type="number" id="price" placeholder="Enter Price">

<label>Product Image</label>
<input type="file" id="image">

<label>Description</label>
<textarea placeholder="Enter Product Description"></textarea>



<button class="submit-btn" onclick="addProduct()">
    Add Product
</button>

</div>



<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCknxcZ-S3XsZK9swp0qRNLGfO1n6JLJKU",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function addProduct(){

let productName = document.getElementById("productname").value;
let productPrice = document.getElementById("price").value;
let imageFile = document.getElementById("image").files[0];

if(!imageFile){
    alert("Select Image");
    return;
}

let formData = new FormData();

formData.append("file", imageFile);
formData.append("upload_preset", "Bestsellingproduct1");

fetch("https://api.cloudinary.com/v1_1/dmfwd0d1x/image/upload",{
    method:"POST",
    body:formData
})
.then(res => res.json())
.then(data => {

    db.collection("products").add({
        name: productName,
        price: productPrice,
        image: data.secure_url
    })

    .then(() => {
        alert("Product Added Successfully");
    })

    .catch((error) => {
        alert(error.message);
    });

})

.catch((error)=>{
    alert("Image Upload Failed");
    console.log(error);
});

}

</script>
</body>
</html>
