<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#ff6b00;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;
}

.product{
background:white;
padding:15px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>
<h1>Seller Dashboard</h1>
</header>

<div class="container">

<div class="card">
<h2>Add Product</h2>

<input type="text" placeholder="Product Name">
<input type="text" placeholder="Price">
<input type="text" placeholder="Image URL">
<textarea placeholder="Product Description"></textarea>

<button>Add Product</button>
</div>

<div class="card">
<h2>My Products</h2>

<div class="product">
<h3>Sample Product</h3>
<p>₹999</p>
</div>

</div>

</div>

</body>
</html>
