<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Selling Product</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
background:#f5f7ff;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

.hero{
padding:60px 20px;
text-align:center;
background:white;
}

.hero h1{
color:#0a66ff;
}

.search-box{
margin-top:20px;
}

.search-box input{
width:70%;
max-width:400px;
padding:10px;
border:2px solid #0a66ff;
border-radius:5px;
}

.search-box button{
padding:10px 20px;
background:#ff6b00;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.categories{
padding:30px;
}

.categories h2{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.login-buttons{
text-align:center;
padding:30px;
}

.btn{
display:inline-block;
margin:10px;
padding:12px 25px;
background:#0a66ff;
color:white;
text-decoration:none;
border-radius:6px;
}

footer{
background:#0a66ff;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}
</style>

</head>
<body>

<header>
<div class="logo">Best Selling Product</div>
</header>

<section class="hero">
<h1>Welcome to Best Selling Product</h1>
<p>Shop Products & Discover Affiliate Deals</p>

<div class="search-box">
<input type="text" placeholder="Search Products">
<button>Search</button>
</div>
</section>

<section class="categories">
<h2>Categories</h2>

<div class="grid">
<div class="card">Electronics</div>
<div class="card">Mobiles</div>
<div class="card">Fashion</div>
<div class="card">Home & Kitchen</div>
<div class="card">Beauty</div>
<div class="card">Gaming</div>
<div class="card">Books</div>
<div class="card">Accessories</div>
</div>

</section>

<section class="login-buttons">
<a href="#" class="btn">Customer Login</a>
<a href="#" class="btn">Seller Login</a>
<a href="#" class="btn">Admin Login</a>
</section>

<footer>
© 2026 Best Selling Product. All Rights Reserved.
</footer>

</body>
                               </html>
