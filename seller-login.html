<!DOCTYPE html>
<html lang="en">
<head>

<title>Seller Login</title>

<style>
*{
margin:0;
padding:0;

font-family:Arial,sans-serif;

body{

.login-container{

.login-container h2{

}

.login-container input{
width:100%;

.login-btn{

.login-btn:hover{

.create-account{

.footer{
