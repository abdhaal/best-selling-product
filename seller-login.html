<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Login - Best Selling Product</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
text-align:center;
color:#0a66ff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#ff6b00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#0a66ff;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Seller Login</h2>

<form action="seller-dashboard.html">
<input type="email" placeholder="Seller Email" required>
<input type="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>
<a href="#">Create Seller Account</a>

</div>

</body>
</html>
