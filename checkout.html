<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:6px;
}

.btn{
display:block;
background:#ff6b00;
color:white;
text-decoration:none;
padding:12px;
text-align:center;
border-radius:6px;
margin-top:10px;
}
</style>

</head>
<body>

<header>
<h1>Checkout</h1>
</header>

<div class="container">

<div class="card">

<h2>Delivery Details</h2>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Phone Number">

<textarea placeholder="Address"></textarea>

<a href="payment.html" class="btn">
Proceed To Payment
</a>

</div>

</div>

</body>
</html>
