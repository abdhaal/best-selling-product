<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product</title>

<style>
/* same CSS */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
max-width:500px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h2{
color:#001f3f;
margin-bottom:20px;
text-align:center;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
color:#001f3f;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
}

textarea{
height:100px;
resize:none;
}

.submit-btn{
width:100%;
background:#001f3f;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#003366;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="header">
Edit Product
</div>

<div class="container">

<h2>Product Details</h2>

<label>Product Name</label>
<input type="text" id="productname" placeholder="Enter Product Name">

<label>Category</label>
<select>
<option>Electronics</option>
<option>Mobiles</option>
<option>Fashion</option>
<option>Home & Kitchen</option>
<option>Beauty</option>
<option>Gaming</option>
</select>

<label>Price</label>
<input type="number" id="price" placeholder="Enter Price">

<label>Product Image</label>
<input type="file" id="image">

<label>Description</label>
<textarea placeholder="Enter Product Description"></textarea>



<button class="submit-btn" onclick="updateProduct()">
    Update Product
</button>

</div>



<script>

const firebaseConfig = {
  apiKey: "AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const productId =
new URLSearchParams(window.location.search).get("id");

// Load product data
db.collection("products")
.doc(productId)
.get()
.then((doc) => {

    if(doc.exists){

        const product = doc.data();

        document.getElementById("productname").value =
        product.name;

        document.getElementById("price").value =
        product.price;

    }

});

// Update product
function updateProduct(){

let productName =
document.getElementById("productname").value;

let productPrice =
document.getElementById("price").value;

let imageFile =
document.getElementById("image").files[0];

// Image change செய்யலனா
if(!imageFile){

    db.collection("products")
    .doc(productId)
    .update({
        name: productName,
        price: productPrice
    })

    .then(() => {
        alert("Product Updated Successfully");
        window.location.href="manage-products.html";
    });

    return;
}

// Image change செய்தா
let formData = new FormData();

formData.append("file", imageFile);
formData.append("upload_preset", "Bestsellingproduct1");

fetch("https://api.cloudinary.com/v1_1/dmfwd0d1x/image/upload",{
    method:"POST",
    body:formData
})
.then(res => res.json())
.then(data => {

    console.log(data);

    if(data.error){
        alert(data.error.message);
        return;
    }

    db.collection("products")
    .doc(productId)
    .update({
        name: productName,
        price: productPrice,
        image: data.secure_url
    })
    .then(() => {
        alert("Product Updated Successfully");
        window.location.href = "manage-products.html";
    });

})
.catch((error)=>{
    console.log(error);
    alert(error.message);
});

}

</script>
</body>
</html>
