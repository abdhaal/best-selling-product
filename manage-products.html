<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Products</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.section{
padding:20px;
}

.product-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.product-card h3{
color:#001f3f;
margin-bottom:8px;
}

.product-card p{
margin-bottom:10px;
}

.btn{
display:inline-block;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
color:white;
font-weight:bold;
margin-right:8px;
}

.edit-btn{
background:#001f3f;
}

.delete-btn{
background:#c62828;
}


</style>
</head>

<body>

<div class="header">
Manage Products
</div>

<div class="section">


<div class="product-card">
<h3>Wireless Earbuds</h3>
<p>₹999</p>

<a href="#" class="btn edit-btn">✏ Edit</a>
<a href="#" class="btn delete-btn">🗑 Delete</a>
</div>

<div class="product-card">
<h3>Smart Watch</h3>
<p>₹1499</p>

<a href="#" class="btn edit-btn">✏ Edit</a>
<a href="#" class="btn delete-btn">🗑 Delete</a>
</div>

<div class="product-card">
<h3>Bluetooth Speaker</h3>
<p>₹799</p>

<a href="#" class="btn edit-btn">✏ Edit</a>
<a href="#" class="btn delete-btn">🗑 Delete</a>
</div>

</div>

</body>
</html>
