<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Products</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.product{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.btn{
background:#ff6b00;
color:white;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:5px;
}
</style>
</head>

<body>

<header>
<h1>Seller Products</h1>
</header>

<div class="container">

<div class="product">
<h3>Wireless Earbuds</h3>
<p>Price: ₹999</p>

<button class="btn">Edit</button>
<button class="btn">Delete</button>
</div>

<div class="product">
<h3>Smart Watch</h3>
<p>Price: ₹1499</p>

<button class="btn">Edit</button>
<button class="btn">Delete</button>
</div>

</div>

</body>
</html>
