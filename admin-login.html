<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.login-container{
max-width:400px;
margin:40px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.login-container h2{
text-align:center;
color:#001f3f;
margin-bottom:20px;
}

.login-container label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#001f3f;
}

.login-container input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:15px;
font-size:16px;
}

.login-btn{
display:block;
width:100%;
background:#001f3f;
color:white;
text-decoration:none;
text-align:center;
padding:14px;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.login-btn:hover{
background:#003366;
}

.info{
margin-top:15px;
font-size:14px;
text-align:center;
color:#666;
}

.footer{
margin-top:50px;
background:#001f3f;
color:white;
text-align:center;
padding:20px;
}

.footer a{
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
Best Selling Product
</div>

<div class="login-container">

<h2>Admin Login</h2>

<label>Admin Email</label>
<input type="email" placeholder="Enter Admin Email">

<label>Admin ID</label>
<input type="text" placeholder="Enter Admin ID">

<a href="admin-otp.html" class="login-btn">
Continue
</a>

<div class="info">
Authorized Administrators Only
</div>

</div>

<div class="footer">

<p>
<a href="privacy-policy.html">Privacy Policy</a> |
<a href="terms-andconditions.html">Terms</a> |
<a href="contact.html">Contact</a>
</p>

<p>© 2026 Best Selling Product</p>

</div>

</body>
</html>
