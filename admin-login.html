body{

background:#f5f7ff;

}

.login-box{

</style></head><body><div class="login-box"><h2>Admin Login</h2><form action="admin-dashboard.html"><input type="email" id="email" placeholder="Admin Email"><input type="password" id="password" placeholder="Password"><button onclick="loginAdmin()">Login</button>

<p>
<a href="index.html">Back To Home</a>
</p></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

const provider = new firebase.auth.GoogleAuthProvider();
provider.addScope('email');

firebase.auth().signInWithPopup(provider)
.then((result) => {
    const user = result.user;

    if (!user || !user.email) {
        alert("Email not found");
        return;
    }

    console.log("Login email:", user.email);

    if (user.email.trim().toLowerCase() === "abdhaal0@gmail.com") {
        window.location.href = "admin-dashboard.html";
    } else {
        alert("Access denied!");
        firebase.auth().signOut();
    }
})
.catch((error) => {
    console.log("Error:", error);
    alert(error.message);
});


</script></body>
</html>
