<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Affiliate Products</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#ff6b00;
color:white;
padding:12px;
border:none;
border-radius:6px;
width:100%;
}
</style>
</head>

<body>

<header>
<h1>Affiliate Products</h1>
</header>

<div class="container">

<div class="card">

<h2>Add Affiliate Product</h2>

<input type="text" placeholder="Product Name">

<input type="text" placeholder="Affiliate Link">

<input type="text" placeholder="Image URL">

<input type="text" placeholder="Price">

<textarea placeholder="Product Description"></textarea>

<button>Add Affiliate Product</button>

</div>

</div>

</body>
</html>
