<!DOCTYPE html>
<html>
<head>
  <title>View Orders</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #0a2a43;
    }

    .order-card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .delete {
      background: red;
      color: white;
    }

    .status {
      background: green;
      color: white;
    }
  </style>
</head>

<body>

<h1>📦 Orders</h1>

<div id="ordersList"></div>

<script>
  function displayOrders() {
    let orders = JSON.parse(localStorage.getItem("orders")) || [];
    let container = document.getElementById("ordersList");

    container.innerHTML = "";

    if (orders.length === 0) {
      container.innerHTML = "<p>No Orders Found</p>";
      return;
    }

    orders.forEach((order, index) => {
      container.innerHTML += `
        <div class="order-card">
          <h3>${order.product}</h3>
          <p>Price: ₹${order.price}</p>
          <p>Customer: ${order.customer}</p>
          <p>Status: ${order.status}</p>

          <button class="status" onclick="updateStatus(${index})">
            Mark Delivered
          </button>

          <button class="delete" onclick="deleteOrder(${index})">
            Delete
          </button>
        </div>
      `;
    });
  }

  function deleteOrder(index) {
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders.splice(index, 1);

    localStorage.setItem("orders", JSON.stringify(orders));
    displayOrders();
  }

  function updateStatus(index) {
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    orders[index].status = "Delivered";

    localStorage.setItem("orders", JSON.stringify(orders));
    displayOrders();
  }

  window.onload = displayOrders;
</script>

</body>
</html>
