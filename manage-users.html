<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users</title>

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #f2f2f2;
}

/* Header */
.header {
  background: #0a2a43;
  color: white;
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* Container */
.container {
  padding: 15px;
}

/* Add Button */
.add-btn {
  background: #0a2a43;
  color: white;
  padding: 15px;
  text-align: center;
  border-radius: 12px;
  margin-bottom: 15px;
  cursor: pointer;
  font-size: 18px;
}

/* Card */
.user-card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.user-card h3 {
  margin: 0;
  color: #0a2a43;
}

.user-card p {
  margin: 5px 0;
}

/* Buttons */
.btn {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
  cursor: pointer;
}

.edit {
  background: #0a2a43;
  color: white;
}

.delete {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div class="header">Manage Users</div>

<div class="container">

  <div class="add-btn">➕ Add New User</div>

  <!-- User 1 -->
  <div class="user-card">
    <h3>Rahim</h3>
    <p>Email: rahim@gmail.com</p>
    <p>Role: Customer</p>

    <button class="btn edit">✏ Edit</button>
    <button class="btn delete">🗑 Delete</button>
  </div>

  <!-- User 2 -->
  <div class="user-card">
    <h3>Arun</h3>
    <p>Email: arun@gmail.com</p>
    <p>Role: Seller</p>

    <button class="btn edit">✏ Edit</button>
    <button class="btn delete">🗑 Delete</button>
  </div>

  <!-- User 3 -->
  <div class="user-card">
    <h3>Sara</h3>
    <p>Email: sara@gmail.com</p>
    <p>Role: Customer</p>

    <button class="btn edit">✏ Edit</button>
    <button class="btn delete">🗑 Delete</button>
  </div>

</div>

</body>
</html>
