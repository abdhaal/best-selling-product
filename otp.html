<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

.header{
background:#001f3f;
color:white;
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
}

.otp-container{
max-width:400px;
margin:30px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.otp-container h2{
color:#001f3f;
margin-bottom:10px;
}

.otp-container p{
margin-bottom:20px;
color:#555;
}

.otp-input{
width:100%;
height:60px;
text-align:center;
font-size:28px;
font-weight:bold;
letter-spacing:10px;
border:2px solid #001f3f;
border-radius:10px;
outline:none;
margin-bottom:20px;
}

.verify-btn{
width:100%;
padding:14px;
background:#001f3f;
color:white;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.verify-btn:hover{
background:#003366;
}

.resend{
text-align:center;
margin-top:15px;
}

.resend a{
text-decoration:none;
color:#001f3f;
font-weight:bold;
}

.footer{
margin-top:40px;
background:#001f3f;
color:white;
text-align:center;
padding:20px;
}

.footer a{
color:white;
text-decoration:none;
margin:0 8px;
}
</style>
</head>

<body>

<div class="header">
Best Selling Product
</div>

<div class="otp-container">

<h2>OTP Verification</h2>

<p>Enter the 4-digit OTP sent to your mobile number or email.</p>

<div class="otp-box">
<input
type="tel"
inputmode="numeric"
pattern="[0-9]*"
maxlength="4"
placeholder="Enter 4 Digit OTP"
class="otp-input">
</div>

<a href="index.html">
<button class="verify-btn" onclick="verifyOtp()">
Verify OTP
</button>
</a>

<div class="resend">
<a href="otp.html">Resend OTP</a>
</div>

</div>

<div class="footer">

<p>
<a href="terms-andconditions.html">Terms</a> |
<a href="privacy-policy.html">Privacy Policy</a> |
<a href="contact.html">Contact</a>
</p>

<p>© 2026 Best Selling Product</p>

</div>
<script>
function verifyOtp(){

var otp=document.querySelector(".otp-input").value;

if(otp==="1234"){
window.location.href="index.html";
}
else{
alert("Invalid OTP");
}

}
</script>
</body>
  </html>
