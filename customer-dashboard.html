<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Account - Dashboard</title>
    <style>
        /* Amazon Global Styling Standards */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Amazon Ember", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #eaeded; /* Amazon light gray background */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Clean Mobile-First Workspace Container */
        .dashboard-container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
        }

        /* Amazon Dark Slate Corporate Header */
        header {
            background-color: #232f3e; 
            color: #ffffff;
            padding: 15px 20px;
            font-size: 19px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo-sub {
            color: #febd69; /* Amazon Accent Gold */
            font-weight: bold;
        }

        /* Main Workspace Container */
        .content {
            padding: 20px;
            flex-grow: 1;
        }

        /* User Welcome Banner Card */
        .user-welcome-card {
            background: linear-gradient(135deg, #f7fafa, #e3e6e6);
            border: 1px solid #d5d9d9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            background-color: #232f3e;
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .user-info h2 {
            font-size: 18px;
            color: #0f1111;
            font-weight: 700;
        }

        .user-info p {
            font-size: 13px;
            color: #565959;
        }

        /* Section Header Layout */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #111111;
            margin-bottom: 12px;
            margin-top: 10px;
        }

        /* Essential Metrics Component Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #d5d9d9;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            transition: border-color 0.2s;
        }
        
        .card:hover {
            border-color: #e77600; /* Subtle Amazon orange glow on interaction */
        }

        .card h3 {
            color: #565959;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            color: #0f1111;
            font-size: 24px;
            font-weight: 700;
        }

        /* Horizontal Carousel Panel (e.g., Buy It Again / Subscriptions) */
        .horizontal-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 25px;
            scroll-behavior: smooth;
        }
        
        /* Hide scrollbar for standard cleanliness */
        .horizontal-list::-webkit-scrollbar {
            display: none;
        }

        .product-mini-card {
            min-width: 110px;
            max-width: 110px;
            background: #ffffff;
            border: 1px solid #e7e7e7;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
            font-size: 11px;
        }

        .product-mini-card .product-img {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .product-mini-card .product-title {
            color: #0f1111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        /* Account Quick Links Group Styling */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #d5d9d9;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #0f1111;
            background-color: #ffffff;
            cursor: pointer;
            text-align: left;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .btn:hover {
            background-color: #f7fafa;
            border-color: #bdc1c1;
        }

        /* Prime Amazon Yellow/Orange Primary Callout button */
        .btn-primary {
            background-color: #ffd814;
            border-color: #fcd200;
        }
        
        .btn-primary:hover {
            background-color: #f7ca00;
            border-color: #f2c200;
        }

        /* Secondary Neutral Gray Action Layout for Sign Out */
        .btn-danger {
            background-color: #f0f2f2;
            border-color: #d5d9d9;
            color: #565959;
            margin-top: 20px;
            justify-content: center;
            font-size: 13px;
        }

        .btn-danger:hover {
            background-color: #e3e6e6;
            color: #111111;
        }

        .arrow-icon {
            color: #888888;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <span>Your Account</span>
            <span class="logo-sub">.shop</span>
        </header>

        <div class="content">
            
            <div class="user-welcome-card">
                <div class="avatar">A</div>
                <div class="user-info">
                    <h2>Hello, Alex Rivera</h2>
                    <p>Prime Member since 2023</p>
                </div>
            </div>

            <h3 class="section-title">Activity Overview</h3>
            <div class="stats-grid">
                <div class="card">
                    <h3>Total Orders</h3>
                    <p>12</p>
                </div>
                <div class="card">
                    <h3>Wishlist Items</h3>
                    <p>45</p>
                </div>
            </div>

            <h3 class="section-title">Buy It Again</h3>
            <div class="horizontal-list">
                <div class="product-mini-card">
                    <div class="product-img">☕</div>
                    <div class="product-title">Coffee Beans</div>
                </div>
                <div class="product-mini-card">
                    <div class="product-img">🔋</div>
                    <div class="product-title">AA Batteries</div>
                </div>
                <div class="product-mini-card">
                    <div class="product-img">🧴</div>
                    <div class="product-title">Face Wash</div>
                </div>
                <div class="product-mini-card">
                    <div class="product-img">🎧</div>
                    <div class="product-title">Ear Tips</div>
                </div>
            </div>

            <h3 class="section-title">Account Settings & Tracking</h3>
            <div class="button-stack">
                <button class="btn btn-primary">
                    <span>📦 Track Your Open Orders</span>
                    <span class="arrow-icon">›</span>
                </button>
                <button class="btn">
                    <span>🛍️ Browse Store Recommendations</span>
                    <span class="arrow-icon">›</span>
                </button>
                <button class="btn">
                    <span>🛒 View Shopping Cart</span>
                    <span class="arrow-icon">›</span>
                </button>
                <button class="btn">
                    <span>💳 Payment Methods & Wallet</span>
                    <span class="arrow-icon">›</span>
                </button>
                <button class="btn">
                    <span>📍 Your Saved Addresses</span>
                    <span class="arrow-icon">›</span>
                </button>
                <button class="btn">
                    <span>🔒 Login & Security Settings</span>
                    <span class="arrow-icon">›</span>
                </button>
                
                <button class="btn btn-danger">Sign Out of Account</button>
            </div>
        </div>
    </div>

</body>
</html>
