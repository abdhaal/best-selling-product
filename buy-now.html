<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#001f3f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

.price{
font-size:24px;
font-weight:bold;
color:#001f3f;
margin-top:10px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:15px;
border:none;
background:#001f3f;
color:white;
font-size:18px;
font-weight:bold;
border-radius:30px;
margin-top:15px;
cursor:pointer;
}

.save-btn{
background:#28a745;
}

.payment-box{
margin-top:10px;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
}

.cod-text{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
Checkout
</div>

<div class="card">

<img id="productImage">

<h2 id="productName"></h2>

<div class="price" id="productPrice"></div>

<div id="savedAddressBox" class="card" style="display:none;">

<h3>Delivery Address</h3>

<p id="savedName"></p>
<p id="savedMobile"></p>
<p id="savedAddress"></p>

<button class="btn"
onclick="showAddressForm()">
Change Address
</button>

</div>

<div id="addressForm" class="card">

<h3>Add New Address</h3>

<input type="text"
id="customerName"
placeholder="Full Name">

<input type="tel"
id="mobile"
placeholder="Mobile Number">

<textarea
id="address"
placeholder="Enter Full Address">
</textarea>

<button class="btn save-btn"
onclick="saveAddress()">
Save Address
</button>

</div>
<div class="card">

<h3>Payment Method</h3>

<label>
<input
type="radio"
name="payment"
disabled>

Cash On Delivery
(Currently Unavailable)
</label>

<br><br>

<label>
<input
type="radio"
name="payment"
checked>

UPI Payment
</label>

</div>

</div>

<button
class="btn"
onclick="placeOrder()">
Continue
</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
authDomain:"best-selling-product-1.firebaseapp.com",
projectId:"best-selling-product-1",
storageBucket:"best-selling-product-1.appspot.com",
messagingSenderId:"211296328412",
appId:"1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const productId =
new URLSearchParams(location.search)
.get("id");

const user = localStorage.getItem("user");

if(user){

db.collection("addresses")
.doc(user)
.get()
.then((doc)=>{

if(doc.exists){

let data = doc.data();

document.getElementById("savedAddressBox")
.style.display="block";

document.getElementById("addressForm")
.style.display="none";

document.getElementById("savedName")
.innerHTML="<b>"+data.name+"</b>";

document.getElementById("savedMobile")
.innerHTML=data.mobile;

document.getElementById("savedAddress")
.innerHTML=data.address;

}

});

}

function saveAddress(){

db.collection("addresses")
.doc(user)
.set({

name:
document.getElementById("customerName").value,

mobile:
document.getElementById("mobile").value,

address:
document.getElementById("address").value

})

.then(()=>{

alert("Address Saved");

location.reload();

});

}

function showAddressForm(){

document.getElementById("savedAddressBox")
.style.display="none";

document.getElementById("addressForm")
.style.display="block";

  }


// PLACE ORDER

function placeOrder(){

let addressDoc =
document.getElementById("savedAddress").innerText;

if(addressDoc==""){

alert("Please Save Address");

return;

}

db.collection("orders")
.add({

productId:productId,

customer:
document.getElementById("savedName").innerText,

mobile:
document.getElementById("savedMobile").innerText,

address:
document.getElementById("savedAddress").innerText,

payment:"UPI",

status:"Pending",

user:user,

date:new Date()

})

.then(()=>{

window.location.href=
"payment-processing.html?id="+productId;

});

  }

</script>

</body>
</html>
