<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Now</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#001f3f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.price{
font-size:24px;
font-weight:bold;
color:#001f3f;
margin-top:10px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

.btn{
width:100%;
padding:15px;
border:none;
background:#ffcc00;
font-size:18px;
font-weight:bold;
border-radius:30px;
margin-top:15px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
Checkout
</div>

<div class="card">

<img id="productImage">

<h2 id="productName"></h2>

<div class="price" id="productPrice"></div>

</div>

<div class="card">

<h3>Delivery Address</h3>

<input type="text" id="customerName"
placeholder="Full Name">

<textarea id="address"
placeholder="Enter Address"></textarea>

</div>

<div class="card">

<h3>Select Payment Method</h3>

<label>
<input type="radio"
name="payment"
value="COD"
checked>
Cash On Delivery
</label>

<br><br>

<label>
<input type="radio"
name="payment"
value="UPI">
UPI
</label>

</div>

<button class="btn"
onclick="placeOrder()">
Continue
</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const productId =
new URLSearchParams(location.search)
.get("id");

db.collection("products")
.doc(productId)
.get()
.then(doc=>{

const p = doc.data();

document.getElementById("productImage").src =
p.image;

document.getElementById("productName").innerText =
p.name;

document.getElementById("productPrice").innerText =
"₹"+p.price;

});

function placeOrder(){

let name =
document.getElementById("customerName").value;

let address =
document.getElementById("address").value;

let payment =
document.querySelector(
'input[name="payment"]:checked'
).value;

db.collection("orders").add({

productId:productId,

customer:name,

address:address,

payment:payment,

status:"Pending",

date:new Date()

})

.then(()=>{

window.location.href=
"order-success.html";

});

}

</script>

</body>
</html>
