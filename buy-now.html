<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
background:#001f3f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
position:sticky;
top:0;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.product-img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

.product-name{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.price{
font-size:24px;
font-weight:bold;
color:#001f3f;
margin-top:10px;
}

.qty-box{
margin-top:10px;
font-size:18px;
}

.summary{
background:#f8f8f8;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-size:20px;
font-weight:bold;
color:#001f3f;
}

input,
textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.save-btn{
background:#28a745;
color:white;
}

.edit-btn{
background:#ff9800;
color:white;
}

.continue-btn{
background:#001f3f;
color:white;
}

.saved-address{
line-height:1.8;
}

.cod{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
Checkout
</div>

<!-- PRODUCT -->

<div class="card">

<img
id="productImage"
class="product-img">

<h2
id="productName"
class="product-name">
</h2>

<div
id="productPrice"
class="price">
</div>

<div class="qty-box">

Quantity :
<b id="productQty">1</b>

</div>

<div
id="productDescription"
style="margin-top:10px;">
</div>

<div class="summary">

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal">
₹0
</span>
</div>

<div class="summary-row">
<span>Delivery</span>
<span>
₹50
</span>
</div>

<div class="summary-row total">
<span>Total</span>
<span id="grandTotal">
₹0
</span>
</div>

</div>

</div>

<!-- SAVED ADDRESS -->

<div
id="savedAddressBox"
class="card"
style="display:none;">

<h3>
Delivery Address
</h3>

<div class="saved-address">

<p id="savedName"></p>

<p id="savedMobile"></p>

<p id="savedAddress"></p>

</div>

<button
class="btn edit-btn"
onclick="showAddressForm()">

Change Address

</button>

</div>

<!-- ADDRESS FORM -->

<div
id="addressForm"
class="card">

<h3>
Add Delivery Address
</h3>

<input
type="text"
id="customerName"
placeholder="Full Name">

<input
type="tel"
id="mobile"
placeholder="Mobile Number">

<textarea
id="address"
placeholder="Enter Full Address">
</textarea>

<button
class="btn save-btn"
onclick="saveAddress()">

Save Address

</button>

</div>
<!-- PAYMENT -->

<div class="card">

<h3>
Payment Method
</h3>

<p class="cod">
Cash On Delivery
(Currently Unavailable)
</p>

<label>

<input
type="radio"
name="payment"
value="UPI"
checked>

UPI Payment

</label>

</div>

<button
class="btn continue-btn"
onclick="placeOrder()">

Continue To Payment

</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyCYrVMVx9Niu3pvN3OQ7_8JAKRjarv_s70",
authDomain:"best-selling-product-1.firebaseapp.com",
projectId:"best-selling-product-1",
storageBucket:"best-selling-product-1.appspot.com",
messagingSenderId:"211296328412",
appId:"1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const productId =
new URLSearchParams(location.search)
.get("id");

const qty =
Number(
new URLSearchParams(location.search)
.get("qty")
) || 1;

const user =
localStorage.getItem("user");

// PRODUCT LOAD

db.collection("products")
.doc(productId)
.get()
.then((doc)=>{

if(doc.exists){

const p = doc.data();

const subtotal =
Number(p.price) * qty;

const grandTotal =
subtotal + 50;

document.getElementById("productImage").src =
p.image || "";

document.getElementById("productName").innerText =
p.name || "";

document.getElementById("productPrice").innerText =
"₹" + p.price;

document.getElementById("productQty").innerText =
qty;

document.getElementById("productDescription").innerText =
p.description || "";

document.getElementById("subtotal").innerText =
"₹" + subtotal;

document.getElementById("grandTotal").innerText =
"₹" + grandTotal;

}

});

// LOAD SAVED ADDRESS

if(user){

db.collection("addresses")
.doc(user)
.get()
.then((doc)=>{

if(doc.exists){

const data = doc.data();

document.getElementById("savedAddressBox")
.style.display = "block";

document.getElementById("addressForm")
.style.display = "none";

document.getElementById("savedName")
.innerHTML =
"<b>" + data.name + "</b>";

document.getElementById("savedMobile")
.innerText =
data.mobile;

document.getElementById("savedAddress")
.innerText =
data.address;

}

});

}

// SAVE ADDRESS

function saveAddress(){

db.collection("addresses")
.doc(user)
.set({

name:
document.getElementById("customerName").value,

mobile:
document.getElementById("mobile").value,

address:
document.getElementById("address").value

})

.then(()=>{

alert("Address Saved");

location.reload();

});

}

// CHANGE ADDRESS

function showAddressForm(){

document.getElementById("savedAddressBox")
.style.display = "none";

document.getElementById("addressForm")
.style.display = "block";

}

// PLACE ORDER

function placeOrder(){

if(
document.getElementById("savedAddress")
.innerText.trim() == ""
){

alert("Please Save Address");

return;

}

db.collection("orders")
.add({

productId: productId,

quantity: qty,

customer:
document.getElementById("savedName")
.innerText,

mobile:
document.getElementById("savedMobile")
.innerText,

address:
document.getElementById("savedAddress")
.innerText,

payment: "UPI",

status: "Pending",

user: user,

date: new Date()

})

.then(()=>{

window.location.href =
"payment-processing.html?id=" +
productId +
"&qty=" +
qty;

});

}

</script>

</body>
</html>
