<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Customer Account</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Georgia, serif;
}

body{
background:#f2f4f8;
}

.header{
background:#002855;
color:white;
text-align:center;
padding:25px;
font-size:22px;
font-weight:bold;
font-style:italic;
}

.container{
max-width:420px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#002855;
margin-bottom:25px;
font-size:24px;
font-style:italic;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#002855;
color:white;
border:none;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#003366;
}

.login-link{
margin-top:20px;
text-align:center;
}

.login-link a{
color:#002855;
font-weight:bold;
text-decoration:none;
}

#msg{
margin-top:15px;
text-align:center;
font-size:14px;
font-weight:bold;
}

.footer{
background:#002855;
color:white;
text-align:center;
padding:25px;
margin-top:50px;
font-style:italic;
}
</style>
</head>

<body>

<div class="header">
Best Selling Product
</div>

<div class="container">

<h2>Create Customer Account</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<input type="password" id="confirmPassword" placeholder="Confirm Password">

<button onclick="signup()">
Create Account
</button>

<p id="msg"></p>

<div class="login-link">
Already have an account?
<br><br>
<a href="customer-login.html">Login Here</a>
</div>

</div>

<div class="footer">
Terms | Privacy Policy | Contact
<br><br>
© 2026 Best Selling Product
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCknxcZ-S3XsZK9swp0qRNLGfO1n6JLJKU",
  authDomain: "best-selling-product-1.firebaseapp.com",
  projectId: "best-selling-product-1",
  storageBucket: "best-selling-product-1.appspot.com",
  messagingSenderId: "211296328412",
  appId: "1:211296328412:web:e73fa3316dfaa1e9c5b219"
};

firebase.initializeApp(firebaseConfig);

function signup(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let confirmPassword = document.getElementById("confirmPassword").value;

if(password !== confirmPassword){
document.getElementById("msg").style.color="red";
document.getElementById("msg").innerText="Passwords do not match";
return;
}

firebase.auth()
.createUserWithEmailAndPassword(email,password)
.then(()=>{

document.getElementById("msg").style.color="green";
document.getElementById("msg").innerText="Account Created Successfully";

setTimeout(()=>{
window.location.href="customer-login.html";
},1500);

})
.catch((error)=>{

document.getElementById("msg").style.color="red";
document.getElementById("msg").innerText=error.message;

});

}

</script>

</body>
</html>
