<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
}

header{
background:#0a66ff;
color:white;
padding:15px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
text-align:center;
font-size:18px;
}
</style>
</head>

<body>

<header>
<h1>Categories</h1>
</header>

<div class="grid">

<div class="card">📱 Electronics</div>
<div class="card">👕 Fashion</div>
<div class="card">🏠 Home & Kitchen</div>
<div class="card">💄 Beauty</div>
<div class="card">🎮 Gaming</div>
<div class="card">📚 Books</div>

</div>

</body>
</html>
